# SkillForge AI — Docker Compose for local development
# Brings up: Backend API, Frontend, LocalStack (AWS), OpenSearch

version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    container_name: skillforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - NOVA_ACT_API_KEY=${NOVA_ACT_API_KEY:-}
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - DYNAMODB_TABLE_USERS=skillforge-users
      - DYNAMODB_TABLE_SESSIONS=skillforge-sessions
      - DYNAMODB_TABLE_LEARNING_PATHS=skillforge-learning-paths
      - LOG_LEVEL=DEBUG
    volumes:
      - ./src:/app/src:ro
    depends_on:
      opensearch:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - skillforge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Next.js Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: skillforge-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skillforge-net

  # ── OpenSearch (Vector DB for embeddings) ───────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: skillforge-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - plugins.security.disabled=true
      - plugins.ml_commons.only_run_on_ml_node=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - skillforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── LocalStack (AWS services emulator for dev) ──────────────────
  localstack:
    image: localstack/localstack:3.8
    container_name: skillforge-localstack
    environment:
      - SERVICES=dynamodb,s3,bedrock
      - DYNAMODB_SHARE_DB=1
      - AWS_DEFAULT_REGION=us-east-1
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    networks:
      - skillforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q 'running'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── OpenSearch Dashboards (optional, for dev exploration) ────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: skillforge-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - skillforge-net
    profiles:
      - debug

volumes:
  opensearch-data:
  localstack-data:

networks:
  skillforge-net:
    driver: bridge